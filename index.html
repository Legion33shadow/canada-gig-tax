    var cost=Math.round(mo*12*y);
    var gain=Math.round(cost*Math.pow(1.07,y));
    html+='<div class="proj-row"><span class="py">'+y+'ans</span>'
      +'<span class="pc">-'+cost.toLocaleString()+unit+'</span>'
      +'<span class="pg">+'+gain.toLocaleString()+unit+' investi</span></div>';
  });
  document.getElementById('proj-body').innerHTML=html;
  document.getElementById('proj').style.display='block';
}
function setStat(id,val){var e=document.getElementById(id);if(e)e.textContent=val;}


function calc(){
  var gross=parseFloat(document.getElementById('gross').value)||0;
  var exp=parseFloat(document.getElementById('exp').value)||0;
  var prov=document.getElementById('prov').value;
  var hst_rate=prov==='ON'?0.13:prov==='BC'?0.12:prov==='QC'?0.14975:0.05;
  var hst_flag=gross>=30000;
  var net_bus=gross-exp;
  var cpp=Math.min(Math.max(net_bus-3500,0)*0.119,7049);
  var taxable=Math.max(0,net_bus-cpp*0.5);
  var fed=0;
  if(taxable<=57375)      fed=taxable*0.15;
  else if(taxable<=114750)fed=8606+(taxable-57375)*0.205;
  else if(taxable<=177882)fed=20361+(taxable-114750)*0.26;
  else                    fed=36780+(taxable-177882)*0.29;
  var prov_tax=0;
  if(prov==='ON'){
    if(taxable<=51446)      prov_tax=taxable*0.0505;
    else if(taxable<=102894)prov_tax=2598+(taxable-51446)*0.0915;
    else                    prov_tax=7306+(taxable-102894)*0.1116;
  } else if(prov==='BC'){
    if(taxable<=45654)      prov_tax=taxable*0.0506;
    else if(taxable<=91310) prov_tax=2310+(taxable-45654)*0.077;
    else                    prov_tax=5824+(taxable-91310)*0.105;
  } else if(prov==='QC'){
    prov_tax=taxable<=51780?taxable*0.14:taxable<=103545?7249+(taxable-51780)*0.19:
      17084+(taxable-103545)*0.24;
  } else {
    prov_tax=taxable*0.10;
  }
  var total_tax=fed+prov_tax+cpp;
  var net=gross-total_tax-exp;
  var eff=gross>0?(total_tax/gross*100).toFixed(1):0;
  setStat('r_net', '$'+Math.round(net).toLocaleString('en-CA'));
  setStat('r_tax', '$'+Math.round(fed+prov_tax).toLocaleString('en-CA'));
  setStat('r_cpp', '$'+Math.round(cpp).toLocaleString('en-CA'));
  setStat('r_hst', hst_flag?'Must register':'Under $30k — optional');
  document.getElementById('stats').style.display='grid';
  var level=eff>35?'bad':eff>25?'warn':'good';
  showShock(
    '$'+Math.round(net).toLocaleString('en-CA'),
    'Real net income after all deductions',
    'Effective total rate: '+eff+'% — set aside '+(eff>30?'30-35%':'25-30%')+' of every payment.',
    level
  );
  showProj(net/12,'$');
}
calc();

</script>
